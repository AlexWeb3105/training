<head lang="ru">
    <meta charset="UTF-8">
    <title>Учимся делать слайдер</title>
    <link rel="stylesheet" type="text/css" href="./style.css">
</head>

<body>
    <main>
        <h1 class="page-title">Слайдер на чистом коде</h1>
        <div class="slider-container">
            <div class="slider">
                <img src="./img/1.png" alt="Белый пушистый кот">
                <img src="./img/2.png" alt="Рыжий пушистый кот в джинсах">
                <img src="./img/3.png" alt="Бело-рыжий пушистый кот">
                <img src="./img/4.png" alt="Бело-рыжий пушистый кот">
                <img src="./img/5.png" alt="Бело-рыжий пушистый кот">
            </div>
            <button class="prev-button" aria-label="Посмотреть предыдущий слайд">&lt;</button>
            <button class="next-button" aria-label="Посмотреть следующий слайд">&gt;</button>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
